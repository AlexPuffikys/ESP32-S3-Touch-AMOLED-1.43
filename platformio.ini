[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; Keep defaults for selected devkit profile (8MB flash, no PSRAM).
; If your hardware variant has PSRAM, switch board or add board_build.psram = enabled.
lib_deps =
    lovyan03/LovyanGFX @ ^1.2.19
